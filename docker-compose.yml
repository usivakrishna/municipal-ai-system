version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/municipal_ai_system
      - JWT_SECRET=replace_with_strong_secret
      - PORT=5000
      - AI_SERVICE_URL=http://ai-service:8001
    depends_on:
      - mongodb

  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"
    depends_on:
      - backend

volumes:
  mongo-data:
